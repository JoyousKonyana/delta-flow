name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o deltaflow-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -o deltaflow-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -o deltaflow-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deltaflow-linux-amd64
            deltaflow-darwin-amd64
            deltaflow-windows-amd64.exe